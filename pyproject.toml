[project]
name = "materialx-db"
version = "0.1.0"
description = "MaterialX material library with SQLite catalog and Three.js MeshPhysicalMaterial export"
requires-python = ">=3.11"
license = "Apache-2.0"
dependencies = [
    "materialx>=1.39.4",
    "materialxmaterials>=1.39.4",
    "requests>=2.31.0",
    "openexr>=3.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/materialx_db"]
